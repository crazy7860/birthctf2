<style>
    body {
  margin: 0;
  font-family: system-ui;
  background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
  color: white;
}

.cursor-glow {
  position: fixed;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  pointer-events: none;
  background: radial-gradient(circle, rgba(180, 0, 255, 0.25), transparent 70%);
  transform: translate(-50%, -50%);
  z-index: 0;
  filter: blur(40px);
}

/* TRAIL CANVAS */
#trail {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 20px;
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.3);
}

/* GRID */
.cards-container {
  display: grid;
  grid-template-columns: repeat(4, 1fr); /* 4 cards per row */
  gap: 20px;
  padding: 40px;
  height: calc(100vh - 70px); /* full screen minus navbar */
  align-content: center; /* vertical center */
}

.card {
  height: 220px;
  border-radius: 18px;
  overflow: hidden;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  transition: all 0.35s ease;
  position: relative;
  overflow: hidden;
}

/* OVERLAY */
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 1.2rem;
  opacity: 0;
  transition: 0.3s ease;
  text-align: center;
  padding: 10px;
  transform: translateY(20px);
}

/* HOVER EFFECT */
.card:hover .overlay {
  opacity: 1;
  transform: translateY(0);
}

/* image smooth */
.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s ease;
}

/* 🔥 HOVER MAGIC */
.card:hover {
  transform: translateY(-12px) scale(1.04);
  box-shadow: 0 15px 40px rgba(128, 0, 128, 0.5);
}

/* image zoom inside */
.card:hover img {
  transform: scale(1.1);
}

.card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 18px;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.2), transparent);
  opacity: 0;
  transition: 0.4s;
}

.card:hover::before {
  opacity: 1;
}

@media (max-width: 768px) {
  .cards-container {
    grid-template-columns: repeat(2, 1fr); /* 2 per row mobile */
  }
}

</style>

<script>
    const music = document.getElementById("favMusic");

// autoplay fix
window.addEventListener("load", () => {
  music.play().catch(() => {
    document.body.addEventListener("click", () => music.play(), { once: true });
  });
});

// cards animation
gsap.from(".card", {
  opacity: 0,
  y: 50,
//   stagger: 0.1,
  duration: 0.8
});


gsap.to(".card", {
  y: -10,
  duration: 2,
  repeat: -1,
  yoyo: true,
//   stagger: 0.2,
  ease: "sine.inOut"
});


const glow = document.querySelector(".cursor-glow");

document.addEventListener("mousemove", (e) => {
  gsap.to(glow, {
    x: e.clientX,
    y: e.clientY,
    duration: 0.3,
    ease: "power2.out"
  });
});



const canvas = document.getElementById("trail");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

// mouse position
let mouse = { x: 0, y: 0 };

document.addEventListener("mousemove", (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;

  // create particle
  particles.push({
    x: mouse.x,
    y: mouse.y,
    size: Math.random() * 4 + 1,
    life: 30
  });
});

// draw loop
function animateTrail() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach((p, i) => {
    p.life--;

    ctx.beginPath();
    ctx.fillStyle = "rgba(180, 0, 255, 0.7)";
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();

    // slight movement
    p.y += 0.5;

    if (p.life <= 0) {
      particles.splice(i, 1);
    }
  });

  requestAnimationFrame(animateTrail);
}

animateTrail();
</script>
