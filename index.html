<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret</title>

<style>

/* RESET */
* {
  box-sizing: border-box;
}

/* BODY */
body {
  margin: 0;
  font-family: system-ui;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
  background-size: 400% 400%;
  animation: bgMove 10s infinite linear;
  color: white;
  padding: 20px;
}

@keyframes bgMove {
  0% {background-position: 0%}
  100% {background-position: 100%}
}

/* CONTAINER */
.container {
  text-align: center;
  width: 100%;
  max-width: 500px;
}

/* TITLE */
.title {
  font-size: 2.5rem;
  margin-bottom: 30px;
  text-shadow: 0 0 25px purple;
}

/* INPUT BOX */
.input-box {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap; /* 🔥 important for mobile */
}

/* INPUT */
input {
  padding: 12px 20px;
  border-radius: 30px;
  border: none;
  outline: none;
  width: 100%;
  max-width: 260px;
  background: rgba(255,255,255,0.1);
  color: white;
  backdrop-filter: blur(10px);
}

/* BUTTON */
button {
  padding: 12px 25px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(45deg, purple, pink);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* HINT */
.hint {
  margin-top: 20px;
  opacity: 0.6;
  font-size: 0.9rem;
}

/* 📱 MOBILE FIX */
@media (max-width: 480px) {

  .title {
    font-size: 1.8rem;
  }

  input {
    max-width: 100%;
  }

  button {
    width: 100%;
  }

}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>

<body>

<div class="container">

  <h1 class="title">Enter Your Secret Code 💜</h1>

  <div class="input-box">
    <input type="text" placeholder="Enter code..." id="code">
    <button onclick="checkCode()">Enter</button>
  </div>

  <p class="hint">Only special people know the code 😏</p>

</div>

<script>

// animation
gsap.from(".title", {
  y: -50,
  opacity: 0,
  duration: 1
});

gsap.from(".input-box", {
  y: 30,
  opacity: 0,
  delay: 0.5
});

// check code
function checkCode() {
  const code = document.getElementById("code").value;

  if (code === "chalaklomdi123") {
    window.location.href = "meme.html";
  } else {
    alert("Wrong code 😏");
  }
}

</script>

</body>
</html>
