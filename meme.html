<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>meme</title>
  <!-- <link rel="stylesheet" href="css/style.css"> -->
  <!-- <link rel="stylesheet" href="css/meme.css"> -->
  <style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: system-ui;
  }
  
  body {
    height: 100vh;
    background: linear-gradient(270deg, #000, #1a1a2e, #000);
    background-size: 400% 400%;
    animation: bgMove 10s infinite linear;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  
  @keyframes bgMove {
    0% {background-position: 0%}
    100% {background-position: 100%}
  }
  
  /* TEXT */
  h1 {
    font-size: 2.5rem;
    color: white;
    text-shadow: 0 0 20px red;
    margin-bottom: 10px;
  }
  
  /* BUTTON */
  button {
    margin-top: 20px;
    padding: 12px 30px;
    border-radius: 30px;
    border: none;
    background: red;
    color: white;
    cursor: pointer;
    transition: 0.3s;
  }
  
  button:hover {
    transform: scale(1.1) rotate(2deg);
    box-shadow: 0 0 20px red;
  }
  </style>


  <!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body class="center dark">

  <h1 id="memeText">Inspect karke aayi ho na?</h1>
  <p>Chalak Lomdi</p>

  <button onclick="goNext()">Show Main Page</button>
    <script>
        function goNext() {
    window.location.href = "main.html";
  }
  
  // animation
  gsap.from("#memeText", {
    scale: 0,
    duration: 0.5
  });

    </script>
  <!-- <script src="js/meme.js"></script> -->
</body>
</html>
